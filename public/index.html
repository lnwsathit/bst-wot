<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Order Tracking - Track Your Orders</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header">
        <div class="header-content">
            <h1 class="logo">📦 Work Order Tracking</h1>
            <p class="tagline">Track your quotation from start to finish</p>
            <div class="admin-link">
                <a href="/login" class="login-link">🔐 Admin Login</a>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Search Section -->
        <div class="search-section">
            <h2>Search Your Order</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by Quotation Number or Customer Name..."
                    class="search-input">
                <button onclick="searchWorkOrders()" class="search-btn">🔍 Search</button>
            </div>
        </div>

        <!-- Results Table -->
        <div class="results-section">
            <div id="message" class="message"></div>

            <div class="table-container">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Quotation No</th>
                            <th>Customer</th>
                            <th>Status</th>
                            <th>Last Update</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 30px; color: #999;">
                                Enter search criteria and click search to find orders
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeDetail()">&times;</span>

            <div class="modal-header">
                <h2 id="detailTitle">Order Details</h2>
                <p id="detailCustomer"></p>
            </div>

            <div class="timeline-container">
                <div class="timeline" id="timeline">
                    <!-- Timeline will be populated here -->
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 Work Order Tracking System. All rights reserved.</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
